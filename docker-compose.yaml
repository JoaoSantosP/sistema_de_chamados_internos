services:
  app:
    image: node:22
    working_dir: /app

    volumes:
      - .:/app
    ports:
      - "3000:3000"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: tail -f /dev/null

  db:
    image: postgres:17

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biblioteca

  #frontend
    