services:
  app:
    image: node:22
    container_name: service_desk_backend

    working_dir: /app

    volumes:
      - ./backend:/app

    ports:
      - "3000:3000"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: sh -c "npm install && npm run dev"

    depends_on:
      - db

  db:
    image: postgres:17
    container_name: service_desk_db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: service_desk

    volumes:
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  frontend:
    image: node:22
    container_name: service_desk_frontend

    working_dir: /app

    volumes:
      - ./frontend:/app

    ports:
      - "5173:5173"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: sh -c "npm install && npm run dev -- --host"